<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    {% assign page_description = page.description | default: page.intro | default: page.excerpt | default: site.description %}
    {% if page_description %}
      <meta name="description" content="{{ page_description | markdownify | strip_html | normalize_whitespace | escape_once }}">
    {% endif %}
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </head>
  <body class="site-body{% if page.layout %} layout-{{ page.layout }}{% endif %}{% if page.body_class %} {{ page.body_class }}{% endif %}">
    <div class="site-shell">
      <a class="skip-link" href="#content">Skip to content</a>
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/words/' | relative_url }}">Words</a>
            <a href="{{ '/phrases/' | relative_url }}">Phrases</a>
          </nav>
        </div>
      </header>

      <main id="content" class="site-main">
        <div class="content-wrap">
          {{ content }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="site-footer__inner">
          <p class="site-footer__brand">Built by <a href="https://github.com/GKGgood">GKGgood</a> with <a href="{{ '/about/' | relative_url }}">Jekyll</a></p>
          <div class="site-footer__meta site-footer__meta--secondary">
            <p id="busuanzi_container_site_pv">Total views <span id="busuanzi_value_site_pv"></span></p>
            <p>
              Last updated
              <time id="last-updated-text" data-last-updated></time>
            </p>
          </div>
        </div>
      </footer>
    </div>
    <script>
      (function () {
        var targets = document.querySelectorAll("[data-last-updated]");
        if (!targets.length) {
          return;
        }

        var modified = new Date(document.lastModified);
        if (Number.isNaN(modified.getTime())) {
          return;
        }

        var year = modified.getFullYear();
        var month = String(modified.getMonth() + 1).padStart(2, "0");
        var day = String(modified.getDate()).padStart(2, "0");
        var formatted = year + "-" + month + "-" + day;

        targets.forEach(function (target) {
          target.dateTime = formatted;
          target.textContent = formatted;
        });
      })();

      (function () {
        var buttons = document.querySelectorAll("[data-pronounce]");
        if (!buttons.length || !("speechSynthesis" in window)) {
          return;
        }

        function pickVoice() {
          var voices = window.speechSynthesis.getVoices();
          if (!voices.length) {
            return null;
          }

          return voices.find(function (voice) {
            return /en-us/i.test(voice.lang);
          }) || voices.find(function (voice) {
            return /^en/i.test(voice.lang);
          }) || null;
        }

        function speak(text) {
          if (!text) {
            return;
          }

          window.speechSynthesis.cancel();
          var utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "en-US";
          utterance.rate = 0.92;
          utterance.pitch = 1;

          var voice = pickVoice();
          if (voice) {
            utterance.voice = voice;
          }

          window.speechSynthesis.speak(utterance);

          return utterance;
        }

        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            buttons.forEach(function (item) {
              item.classList.remove("is-speaking");
            });

            var utterance = speak(button.getAttribute("data-pronounce"));
            if (!utterance) {
              return;
            }

            button.classList.add("is-speaking");
            utterance.onend = function () {
              button.classList.remove("is-speaking");
            };
            utterance.onerror = function () {
              button.classList.remove("is-speaking");
            };
          });
        });

        if (typeof window.speechSynthesis.onvoiceschanged !== "undefined") {
          window.speechSynthesis.onvoiceschanged = function () {
            pickVoice();
          };
        }
      })();

      (function () {
        var controls = document.querySelector("[data-sort-controls]");
        if (!controls) {
          return;
        }

        var items = Array.from(document.querySelectorAll(".entry-list-item[data-source-path][data-alpha-index]"));
        if (!items.length) {
          return;
        }

        var buttons = controls.querySelectorAll("[data-sort-option]");
        var listParent = items[0].parentNode;
        var recentDates = null;
        var recentRequest = null;
        var recentCacheKey = "entry-sort-recent-dates";
        var recentCacheMaxAge = 60 * 60 * 1000;
        var itemPaths = items.map(getSourcePath).filter(function (path, index, paths) {
          return path && paths.indexOf(path) === index;
        });

        if (!buttons.length || !listParent) {
          return;
        }

        function getAlphaIndex(item) {
          var value = Number.parseInt(item.getAttribute("data-alpha-index"), 10);
          return Number.isNaN(value) ? Number.MAX_SAFE_INTEGER : value;
        }

        function getSortTitle(item) {
          return item.getAttribute("data-sort-title") || "";
        }

        function getSourcePath(item) {
          return (item.getAttribute("data-source-path") || "").replace(/^\/+/, "");
        }

        function updateButtons(activeOption) {
          buttons.forEach(function (button) {
            button.setAttribute("aria-pressed", button.getAttribute("data-sort-option") === activeOption ? "true" : "false");
          });
        }

        function renderItems(sortedItems) {
          sortedItems.forEach(function (item, index) {
            listParent.appendChild(item);

            var number = item.querySelector(".entry-list-item__number");
            if (number) {
              number.textContent = index + 1 + ".";
            }
          });
        }

        function sortAlphabetically() {
          renderItems(items.slice().sort(function (left, right) {
            var indexDiff = getAlphaIndex(left) - getAlphaIndex(right);
            if (indexDiff) {
              return indexDiff;
            }

            return getSortTitle(left).localeCompare(getSortTitle(right));
          }));

          updateButtons("az");
        }

        function sortByRecent(datesByPath) {
          renderItems(items.slice().sort(function (left, right) {
            var leftTime = Date.parse(datesByPath[getSourcePath(left)] || "") || 0;
            var rightTime = Date.parse(datesByPath[getSourcePath(right)] || "") || 0;
            var timeDiff = rightTime - leftTime;

            if (timeDiff) {
              return timeDiff;
            }

            return getAlphaIndex(left) - getAlphaIndex(right);
          }));

          updateButtons("recent");
        }

        function hasDatesForCurrentPage(datesByPath) {
          if (!datesByPath) {
            return false;
          }

          return itemPaths.every(function (path) {
            return Boolean(datesByPath[path]);
          });
        }

        function mergeDates(baseDates, extraDates) {
          var merged = {};

          [baseDates, extraDates].forEach(function (source) {
            if (!source || typeof source !== "object") {
              return;
            }

            Object.keys(source).forEach(function (path) {
              if (source[path]) {
                merged[path] = source[path];
              }
            });
          });

          return merged;
        }

        function getMissingPaths(datesByPath) {
          return itemPaths.filter(function (path) {
            return !datesByPath[path];
          });
        }

        function readRecentCache() {
          if (!("localStorage" in window)) {
            return null;
          }

          try {
            var raw = window.localStorage.getItem(recentCacheKey);
            if (!raw) {
              return null;
            }

            var parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object" || typeof parsed.savedAt !== "number" || !parsed.dates || typeof parsed.dates !== "object") {
              return null;
            }

            if (Date.now() - parsed.savedAt > recentCacheMaxAge) {
              window.localStorage.removeItem(recentCacheKey);
              return null;
            }

            return parsed.dates;
          } catch (error) {
            return null;
          }
        }

        function writeRecentCache(datesByPath) {
          if (!("localStorage" in window) || !Object.keys(datesByPath).length) {
            return;
          }

          try {
            window.localStorage.setItem(recentCacheKey, JSON.stringify({
              savedAt: Date.now(),
              dates: datesByPath
            }));
          } catch (error) {
            return;
          }
        }

        function fetchCommitDate(sourcePath) {
          if (!sourcePath) {
            return Promise.resolve({ path: sourcePath, date: null });
          }

          var url = "https://api.github.com/repos/GKGgood/GKGgood.github.io/commits?path=" + encodeURIComponent(sourcePath) + "&per_page=1";

          return window.fetch(url, {
            headers: {
              Accept: "application/vnd.github+json"
            }
          }).then(function (response) {
            if (!response.ok) {
              return null;
            }

            return response.json();
          }).then(function (payload) {
            var commit = Array.isArray(payload) ? payload[0] : null;
            var date = commit && commit.commit && commit.commit.committer && commit.commit.committer.date;
            if (!date) {
              date = commit && commit.commit && commit.commit.author && commit.commit.author.date;
            }

            return {
              path: sourcePath,
              date: date || null
            };
          }).catch(function () {
            return {
              path: sourcePath,
              date: null
            };
          });
        }

        function fetchMissingRecentDates(baseDates) {
          var missingPaths = getMissingPaths(baseDates || {});
          if (!missingPaths.length) {
            return Promise.resolve(baseDates || {});
          }

          return Promise.all(missingPaths.map(function (sourcePath) {
            return fetchCommitDate(sourcePath);
          })).then(function (results) {
            var fetchedDates = {};

            results.forEach(function (result) {
              if (result.path && result.date) {
                fetchedDates[result.path] = result.date;
              }
            });

            return mergeDates(baseDates, fetchedDates);
          });
        }

        function fetchRecentDates() {
          if (recentDates) {
            if (hasDatesForCurrentPage(recentDates)) {
              return Promise.resolve(recentDates);
            }
          }

          if (recentRequest) {
            return recentRequest;
          }

          if (!("fetch" in window) || !("Promise" in window)) {
            return null;
          }

          recentDates = mergeDates(recentDates, readRecentCache());
          if (hasDatesForCurrentPage(recentDates)) {
            return Promise.resolve(recentDates);
          }

          recentRequest = fetchMissingRecentDates(recentDates).then(function (datesByPath) {
            recentDates = datesByPath;

            writeRecentCache(recentDates);
            recentRequest = null;

            return recentDates;
          }).catch(function () {
            recentRequest = null;
            return {};
          });

          return recentRequest;
        }

        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            var option = button.getAttribute("data-sort-option");

            if (option === "recent") {
              var recentDatesRequest = fetchRecentDates();
              if (!recentDatesRequest) {
                sortAlphabetically();
                return;
              }

              recentDatesRequest.then(function (datesByPath) {
                if (!Object.keys(datesByPath).length) {
                  sortAlphabetically();
                  return;
                }

                sortByRecent(datesByPath);
              }).catch(function () {
                sortAlphabetically();
              });

              return;
            }

            sortAlphabetically();
          });
        });

        sortAlphabetically();
      })();
    </script>
  </body>
</html>

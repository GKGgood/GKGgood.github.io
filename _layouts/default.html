<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    {% assign page_description = page.description | default: page.intro | default: page.excerpt | default: site.description %}
    {% if page_description %}
      <meta name="description" content="{{ page_description | markdownify | strip_html | normalize_whitespace | escape_once }}">
    {% endif %}
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  </head>
  <body class="site-body{% if page.layout %} layout-{{ page.layout }}{% endif %}{% if page.body_class %} {{ page.body_class }}{% endif %}">
    <div class="site-shell">
      <a class="skip-link" href="#content">Skip to content</a>
      <header class="site-header">
        <div class="site-header__inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/words/' | relative_url }}">Words</a>
            <a href="{{ '/phrases/' | relative_url }}">Phrases</a>
          </nav>
        </div>
      </header>

      <main id="content" class="site-main">
        <div class="content-wrap">
          {{ content }}
        </div>
      </main>

      <footer class="site-footer">
        <div class="site-footer__inner">
          <p class="site-footer__brand">Built by <a href="{{ '/about/' | relative_url }}">jekyll</a></p>
          <div class="site-footer__meta site-footer__meta--secondary">
            <p id="busuanzi_container_site_pv">Total views <span id="busuanzi_value_site_pv"></span></p>
            <p>
              Last updated
              <time id="last-updated-text" data-last-updated></time>
            </p>
          </div>
        </div>
      </footer>
    </div>
    <script>
      (function () {
        var targets = document.querySelectorAll("[data-last-updated]");
        if (!targets.length) {
          return;
        }

        var modified = new Date(document.lastModified);
        if (Number.isNaN(modified.getTime())) {
          return;
        }

        var year = modified.getFullYear();
        var month = String(modified.getMonth() + 1).padStart(2, "0");
        var day = String(modified.getDate()).padStart(2, "0");
        var formatted = year + "-" + month + "-" + day;

        targets.forEach(function (target) {
          target.dateTime = formatted;
          target.textContent = formatted;
        });
      })();

      (function () {
        var buttons = document.querySelectorAll("[data-pronounce]");
        if (!buttons.length || !("speechSynthesis" in window)) {
          return;
        }

        function pickVoice() {
          var voices = window.speechSynthesis.getVoices();
          if (!voices.length) {
            return null;
          }

          return voices.find(function (voice) {
            return /en-us/i.test(voice.lang);
          }) || voices.find(function (voice) {
            return /^en/i.test(voice.lang);
          }) || null;
        }

        function speak(text) {
          if (!text) {
            return;
          }

          window.speechSynthesis.cancel();
          var utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "en-US";
          utterance.rate = 0.92;
          utterance.pitch = 1;

          var voice = pickVoice();
          if (voice) {
            utterance.voice = voice;
          }

          window.speechSynthesis.speak(utterance);

          return utterance;
        }

        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            buttons.forEach(function (item) {
              item.classList.remove("is-speaking");
            });

            var utterance = speak(button.getAttribute("data-pronounce"));
            if (!utterance) {
              return;
            }

            button.classList.add("is-speaking");
            utterance.onend = function () {
              button.classList.remove("is-speaking");
            };
            utterance.onerror = function () {
              button.classList.remove("is-speaking");
            };
          });
        });

        if (typeof window.speechSynthesis.onvoiceschanged !== "undefined") {
          window.speechSynthesis.onvoiceschanged = function () {
            pickVoice();
          };
        }
      })();
    </script>
  </body>
</html>

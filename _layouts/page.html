---
layout: default
---

<article class="page-layout">
  {% assign page_intro = page.intro | default: page.description %}
  {% if page.title or page_intro %}
    <header class="page-layout__header">
      {% if page.title %}
        <h1>{{ page.title }}</h1>
      {% endif %}
      {% if page_intro %}
        <p class="page-layout__intro">{{ page_intro }}</p>
      {% endif %}
    </header>
  {% endif %}

  <div class="page-layout__content">
    {{ content }}
  </div>
</article>
